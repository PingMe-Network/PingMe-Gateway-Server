# ===============================================================
# CORE APPLICATION
# ===============================================================
spring.application.name=PINGME-GATEWAY-SERVER
spring.threads.virtual.enabled=true
server.port=8080
# ===============================================================
# INFRASTRUCTURE & DATA
# ===============================================================
### Service URLs
service.url.auth=${AUTH_SERVICE_URL}
service.url.core=${CORE_SERVICE_URL}
service.url.music=${MUSIC_SERVICE_URL}
service.url.reel=${REEL_SERVICE_URL}
service.url.utility=${UTILITY_SERVICE_URL}
# ===============================================================
# SECURITY
# ===============================================================
security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
# ===============================================================
# OBSERVABILITY (LOGS & HEALTH)
# ===============================================================
## Actuator
management.endpoints.web.exposure.include=health,info
management.info.env.enabled=true
management.endpoint.health.probes.enabled=true
management.endpoint.health.status.http-mapping.UP=200
management.endpoint.health.status.http-mapping.DOWN=503
## Logging
logging.level.root=INFO
logging.level.me.huynhducphu=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.org.springframework.security.oauth2=DEBUG
# ===============================================================
# WEBFLUX CONFIGURATION
# ===============================================================
## JSON Format
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=Asia/Ho_Chi_Minh
# ===============================================================
# REDIS RATE LIMITER
# ===============================================================
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}